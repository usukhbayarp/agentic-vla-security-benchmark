services:
  ui:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /srv
    command: python -m http.server 8080 --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/tinydesk.html')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - ./sandbox_ui:/srv:ro

  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        VLLM_REF: "v0.12.0"
        TORCH_CUDA_ARCH_LIST: "12.1+PTX"
        MAX_JOBS: "8"
        NVCC_THREADS: "2"
    restart: unless-stopped
    gpus: all
    shm_size: "16gb"
    ipc: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
      - VLLM_USE_TRITON_FLASH_ATTN=0
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/models')\""]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 120s
    ports:
      - "8001:8000"
    volumes:
      - ${HF_CACHE_DIR:-$HOME/.cache/huggingface}:/root/.cache/huggingface

  agent:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    restart: unless-stopped
    shm_size: "2gb"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    depends_on:
      ui:
        condition: service_healthy
      vllm:
        condition: service_healthy
    environment:
      - TINYDESK_URL=http://ui:8080/tinydesk.html
      - QWEN_VL_MODEL=Qwen/Qwen3-VL-4B-Instruct
      - QWEN_VL_REVISION=ebb281ec70b05090aa6165b016eac8ec08e71b17
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_API_KEY=token-abc123
      - VLLM_MODEL=Qwen/Qwen3-VL-4B-Instruct
    volumes:
      - ${HF_CACHE_DIR:-$HOME/.cache/huggingface}:/root/.cache/huggingface
      - ./runs:/app/runs